<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Meow Bots</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a1a;
      color: #ffffff;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 50%, rgba(129, 140, 248, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(179, 144, 247, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(103, 232, 249, 0.12) 0%, transparent 40%);
      animation: bgFloat 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translateY(0px); opacity: 0.4; }
      50% { transform: translateY(-10px); opacity: 0.6; }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: float-particle 20s infinite ease-in-out;
    }

    @keyframes float-particle {
      0% { opacity: 0; transform: translateY(100vh) translateX(0); }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-100vh) translateX(100px); }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-container,
    .admin-container {
      backdrop-filter: blur(10px);
      background: rgba(10, 10, 26, 0.6);
      border: 1px solid rgba(129, 140, 248, 0.25);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 1100px;
      position: relative;
      overflow: hidden;
    }

    .login-container {
      max-width: 450px;
    }

    .login-container::before,
    .admin-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #818cf8, #b390f7, #67e8f9, #86efac, #fde68a);
      background-size: 200% 100%;
      animation: rainbow-wave 4s ease-in-out infinite;
    }

    @keyframes rainbow-wave {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #818cf8, #b390f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"],
    input[type="text"],
    input[type="text"].password-input {
      width: 100%;
      padding: 0.8rem 2.5rem 0.8rem 0.8rem;
      border: 1px solid rgba(129, 140, 248, 0.3);
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      font-size: 1rem;
      color: #ffffff;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
    }

    input[type="password"]::placeholder,
    input[type="text"].password-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input[type="password"]:focus,
    input[type="text"].password-input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 20px rgba(129, 140, 248, 0.3);
      background: rgba(0, 0, 0, 0.5);
    }

    .password-toggle {
      position: absolute;
      right: 0.8rem;
      background: none;
      border: none;
      color: rgba(129, 140, 248, 0.7);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.4rem;
      transition: color 0.3s;
    }

    .password-toggle:hover {
      color: #818cf8;
    }

    .remember-me {
      display: flex;
      align-items: center;
      margin-bottom: 1.5rem;
      cursor: pointer;
      user-select: none;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 0.5rem;
      cursor: pointer;
      accent-color: #818cf8;
    }

    .remember-me label {
      margin: 0;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 400;
      cursor: pointer;
    }

    button {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 10px;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      color: #fff;
      border: none;
      font-size: 1rem;
      font-weight: 700;
    }

    .btn-login:hover {
      box-shadow: 0 0 30px rgba(129, 140, 248, 0.6);
      transform: translateY(-2px);
    }

    .error {
      color: #ff1744;
      text-align: center;
      margin-top: 1rem;
      font-weight: 600;
    }

    .bots-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .bot-card {
      padding: 1.5rem;
      background: linear-gradient(135deg, rgba(129, 140, 248, 0.08), rgba(179, 144, 247, 0.08));
      border: 1px solid rgba(129, 140, 248, 0.25);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .bot-card:hover {
      border-color: rgba(129, 140, 248, 0.5);
      box-shadow: 0 8px 30px rgba(129, 140, 248, 0.15);
      transform: translateY(-5px);
    }

    .bot-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #818cf8, #b390f7, #67e8f9);
    }

    .bot-card h2 {
      margin-bottom: 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #818cf8, #b390f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-display {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.8rem;
      min-height: 18px;
    }

    .status-display.success {
      color: #86efac;
    }

    .status-display.loading {
      color: #fde68a;
    }

    .status-display.error {
      color: #ff1744;
    }

    .status-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .status-btn {
      padding: 0.6rem;
      border: 1px solid rgba(129, 140, 248, 0.4);
      background: rgba(129, 140, 248, 0.1);
      color: #818cf8;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .status-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(129, 140, 248, 0.3);
    }

    .status-btn.online {
      border-color: #86efac;
      color: #86efac;
      background: rgba(134, 239, 172, 0.1);
    }

    .status-btn.online.active {
      background: rgba(134, 239, 172, 0.3);
      box-shadow: 0 6px 15px rgba(134, 239, 172, 0.4);
    }

    .status-btn.offline {
      border-color: #ff1744;
      color: #ff1744;
      background: rgba(255, 23, 68, 0.1);
    }

    .status-btn.offline.active {
      background: rgba(255, 23, 68, 0.3);
      box-shadow: 0 6px 15px rgba(255, 23, 68, 0.4);
    }

    .status-btn.maintenance {
      border-color: #fde68a;
      color: #fde68a;
      background: rgba(253, 230, 138, 0.1);
    }

    .status-btn.maintenance.active {
      background: rgba(253, 230, 138, 0.3);
      box-shadow: 0 6px 15px rgba(253, 230, 138, 0.4);
    }

    .status-btn.purfecting {
      border-color: #b390f7;
      color: #b390f7;
      background: rgba(179, 144, 247, 0.1);
    }

    .status-btn.purfecting.active {
      background: rgba(179, 144, 247, 0.3);
      box-shadow: 0 6px 15px rgba(179, 144, 247, 0.4);
    }

    .logout-btn {
      width: 100%;
      padding: 0.8rem;
      background: rgba(179, 144, 247, 0.2);
      border: 1px solid rgba(179, 144, 247, 0.4);
      color: #b390f7;
      font-size: 1rem;
    }

    .logout-btn:hover {
      background: rgba(179, 144, 247, 0.3);
      box-shadow: 0 8px 20px rgba(179, 144, 247, 0.3);
      transform: translateY(-2px);
    }

    .hidden {
      display: none !important;
    }

    /* ========== TABS ========== */
    .admin-tabs {
      display: flex; gap: 0; margin-bottom: 2rem;
      border-bottom: 1px solid rgba(129, 140, 248, 0.2);
    }
    .admin-tab {
      padding: 0.8rem 1.5rem; background: none; border: none;
      border-bottom: 3px solid transparent;
      color: rgba(255, 255, 255, 0.5); font-size: 1rem; font-weight: 600;
      transition: all 0.3s; cursor: pointer;
    }
    .admin-tab:hover { color: rgba(255, 255, 255, 0.8); }
    .admin-tab.active {
      color: #818cf8; border-bottom-color: #818cf8;
      background: rgba(129, 140, 248, 0.05);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ========== PATCH NOTES FORM ========== */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .patch-form select,
    .patch-form input[type="text"],
    .patch-form input[type="date"] {
      width: 100%; padding: 0.8rem;
      border: 1px solid rgba(129, 140, 248, 0.3);
      background: rgba(0, 0, 0, 0.3); border-radius: 10px;
      font-size: 1rem; color: #ffffff;
      transition: all 0.3s; font-family: 'Outfit', sans-serif;
    }
    .patch-form select option { background: #0a0a1a; color: #fff; }
    .patch-form select:focus,
    .patch-form input:focus {
      outline: none; border-color: #818cf8;
      box-shadow: 0 0 20px rgba(129, 140, 248, 0.3);
      background: rgba(0, 0, 0, 0.5);
    }
    .patch-form label {
      display: block; margin-bottom: 0.4rem;
      color: rgba(255, 255, 255, 0.8); font-weight: 500; font-size: 0.9rem;
    }

    .version-bumps { display: flex; gap: 4px; margin-top: 6px; }
    .bump-btn {
      padding: 5px 10px; background: rgba(129, 140, 248, 0.08);
      border: 1px solid rgba(129, 140, 248, 0.3);
      color: rgba(255, 255, 255, 0.7); border-radius: 6px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; transition: all 0.2s;
    }
    .bump-btn:hover { background: rgba(129, 140, 248, 0.2); color: #818cf8; border-color: #818cf8; }
    .version-hint { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); margin-top: 4px; }

    .editor-toolbar {
      display: flex; flex-wrap: wrap; gap: 4px; padding: 8px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(129, 140, 248, 0.3); border-bottom: none;
      border-radius: 10px 10px 0 0;
    }
    .editor-toolbar button {
      padding: 6px 10px; background: rgba(129, 140, 248, 0.08);
      border: 1px solid rgba(129, 140, 248, 0.3); color: rgba(255, 255, 255, 0.7);
      border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; transition: all 0.2s; min-height: auto;
    }
    .editor-toolbar button:hover { background: rgba(129, 140, 248, 0.2); color: #818cf8; }
    .editor-toolbar .sep { width: 1px; background: rgba(129, 140, 248, 0.2); margin: 0 4px; }
    .editor-area {
      min-height: 300px; padding: 1rem; background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(129, 140, 248, 0.3); border-radius: 0 0 10px 10px;
      color: #ffffff; font-family: 'Outfit', sans-serif; font-size: 0.95rem;
      line-height: 1.7; overflow-y: auto; outline: none;
    }
    .editor-area:focus { border-color: #818cf8; box-shadow: 0 0 20px rgba(129, 140, 248, 0.2); }
    .editor-area ul, .editor-area ol { padding-left: 1.5rem; }
    .editor-area code {
      background: rgba(129, 140, 248, 0.15); border: 1px solid rgba(129, 140, 248, 0.25);
      padding: 0.1rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
    }

    .submit-row { display: flex; gap: 1rem; align-items: center; margin-top: 1.5rem; flex-wrap: wrap; }
    .btn-submit {
      padding: 0.8rem 2rem; background: linear-gradient(135deg, #818cf8, #6366f1);
      color: #fff; border: none; font-size: 1rem; font-weight: 700;
    }
    .btn-submit:hover { box-shadow: 0 0 30px rgba(129, 140, 248, 0.6); transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .discord-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
      background: rgba(88, 101, 242, 0.15); border: 1px solid rgba(88, 101, 242, 0.3);
      border-radius: 6px; font-size: 0.8rem; color: #7289da;
    }
    .submit-status { font-size: 0.9rem; }
    .submit-status.success { color: #86efac; }
    .submit-status.error { color: #ff1744; }

    .preview-toggle {
      margin-top: 1rem; padding: 0.6rem 1rem; background: rgba(129, 140, 248, 0.08);
      border: 1px solid rgba(129, 140, 248, 0.3); color: rgba(255, 255, 255, 0.7);
      border-radius: 8px; font-size: 0.85rem; transition: all 0.2s;
    }
    .preview-toggle:hover { color: #818cf8; border-color: #818cf8; }
    .preview-panel {
      display: none; margin-top: 1rem; padding: 1.5rem;
      background: rgba(129, 140, 248, 0.05); border: 1px solid rgba(129, 140, 248, 0.2);
      border-radius: 10px;
    }
    .preview-panel.active { display: block; }
    .preview-panel h4 { color: #818cf8; margin: 0 0 0.5rem; font-family: 'Space Grotesk', sans-serif; }
    .preview-panel .preview-date { color: #f472b6; font-size: 0.85rem; margin-bottom: 1rem; }
    .preview-panel .preview-body { color: rgba(255, 255, 255, 0.8); line-height: 1.7; }
    .preview-panel .preview-body strong { color: #fff; }
    .preview-panel .preview-body code {
      background: rgba(129, 140, 248, 0.15); border: 1px solid rgba(129, 140, 248, 0.25);
      padding: 0.1rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem; color: #f472b6;
    }
    .preview-panel .preview-body ul { padding-left: 2rem; }
    .preview-panel .preview-body li { margin: 0.3rem 0; }

    @media (max-width: 768px) {
      .bots-grid {
        grid-template-columns: 1fr;
      }

      .admin-container {
        max-width: 100%;
        padding: 1.5rem;
      }

      .form-row { grid-template-columns: 1fr; }

      .status-buttons {
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
      }

      .status-btn {
        padding: 0.8rem;
        font-size: 0.9rem;
      }

      .bot-card {
        padding: 1.5rem;
      }

      button {
        min-height: 44px;
      }

      input[type="password"] {
        padding: 1rem;
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 1rem;
      }

      .login-container,
      .admin-container {
        padding: 1.5rem;
        border-radius: 15px;
      }

      h1 {
        font-size: 1.4rem;
        margin-bottom: 1.2rem;
      }

      .bot-card h2 {
        font-size: 1rem;
        margin-bottom: 0.8rem;
      }

      .status-buttons {
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
      }

      .status-btn {
        padding: 0.7rem;
        font-size: 0.8rem;
      }

      .logout-btn {
        padding: 0.9rem;
        font-size: 0.95rem;
      }

      .admin-tab { padding: 0.6rem 1rem; font-size: 0.85rem; }

      input[type="password"] {
        padding: 0.9rem;
      }

      .btn-login {
        padding: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="particles">
    <div class="particle" style="left: 10%; animation-delay: 0s;">✨</div>
    <div class="particle" style="left: 25%; animation-delay: 4s;">🐱</div>
    <div class="particle" style="left: 40%; animation-delay: 8s;">⭐</div>
    <div class="particle" style="left: 60%; animation-delay: 12s;">😺</div>
    <div class="particle" style="left: 80%; animation-delay: 16s;">💫</div>
  </div>

  <div class="content">
    <div id="loginForm" class="login-container">
      <h1>🐱 Bot Admin</h1>
      <div class="form-group">
        <label for="passwordInput">Admin Password</label>
        <div class="password-wrapper">
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="off"/>
          <button type="button" class="password-toggle" id="togglePassword" onclick="togglePasswordVisibility()">👁️</button>
        </div>
      </div>
      <div class="remember-me">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember me</label>
      </div>
      <button class="btn-login" onclick="login()">Login</button>
      <div class="error" id="loginError"></div>
    </div>

    <div id="adminPanel" class="admin-container hidden">
      <h1>🐱 Admin Panel</h1>

      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchTab('status', this)">🤖 Bot Status</button>
        <button class="admin-tab" onclick="switchTab('patch', this)">📋 Patch Notes</button>
      </div>

      <!-- Tab: Bot Status -->
      <div id="tab-status" class="tab-panel active">
      <div class="bots-grid">
        <div class="bot-card" id="cat-cafeCard">
          <h2>🎮 Cat Cafe</h2>
          <div class="status-display" id="cat-cafeStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('cat-cafe', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('cat-cafe', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('cat-cafe', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('cat-cafe', 'purfecting')">✨ Perf</button>
          </div>
        </div>

        <div class="bot-card" id="meow-botCard">
          <h2>😺 Meow Bot</h2>
          <div class="status-display" id="meow-botStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('meow-bot', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('meow-bot', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('meow-bot', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('meow-bot', 'purfecting')">✨ Perf</button>
          </div>
        </div>

        <div class="bot-card" id="meow-managerCard">
          <h2>👑 Meow Manager</h2>
          <div class="status-display" id="meow-managerStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('meow-manager', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('meow-manager', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('meow-manager', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('meow-manager', 'purfecting')">✨ Perf</button>
          </div>
        </div>

        <div class="bot-card" id="twitch-botCard">
          <h2>🎥 Twitch Meow Bot</h2>
          <div class="status-display" id="twitch-botStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('twitch-bot', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('twitch-bot', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('twitch-bot', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('twitch-bot', 'purfecting')">✨ Perf</button>
          </div>
        </div>
      </div>
      </div><!-- end tab-status -->

      <!-- Tab: Patch Notes -->
      <div id="tab-patch" class="tab-panel">
        <div class="patch-form">
          <div class="form-row">
            <div class="form-group">
              <label>Bot</label>
              <select id="patchBot">
                <option value="cat-cafe" data-name="Cat Cafe Economy Bot">🐱 Cat Cafe Economy Bot</option>
                <option value="meow-bot" data-name="Meow Bot">😺 Meow Bot</option>
                <option value="meow-manager" data-name="Meow Manager">🛠️ Meow Manager</option>
              </select>
            </div>
            <div class="form-group">
              <label>Release Date</label>
              <input type="date" id="patchDate">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Version</label>
              <input type="text" id="patchVersion" placeholder="Version 1.6.0">
              <div class="version-bumps">
                <button class="bump-btn" onclick="bumpVersion('patch')" title="Bug fixes (1.5.0 → 1.5.1)">+Patch</button>
                <button class="bump-btn" onclick="bumpVersion('minor')" title="New features (1.5.0 → 1.6.0)">+Minor</button>
                <button class="bump-btn" onclick="bumpVersion('major')" title="Big release (1.5.0 → 2.0.0)">+Major</button>
              </div>
              <div class="version-hint" id="versionHint">Select a bot to see suggested version</div>
            </div>
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="patchTitle" placeholder="New Features & Fixes">
            </div>
          </div>

          <div class="form-group">
            <label>Content</label>
            <div class="editor-toolbar">
              <button onclick="fmt('bold')" title="Bold"><b>B</b></button>
              <button onclick="fmt('italic')" title="Italic"><i>I</i></button>
              <button onclick="insertCode()" title="Inline Code">&lt;/&gt;</button>
              <div class="sep"></div>
              <button onclick="fmt('insertUnorderedList')" title="Bullet List">• List</button>
              <button onclick="fmt('insertOrderedList')" title="Numbered List">1. List</button>
              <div class="sep"></div>
              <button onclick="insertHeading()" title="Section Heading">H</button>
              <button onclick="insertEmoji()" title="Insert Emoji">😺</button>
            </div>
            <div class="editor-area" id="patchContent" contenteditable="true"></div>
          </div>

          <button class="preview-toggle" onclick="togglePreview()">👁️ Toggle Preview</button>
          <div class="preview-panel" id="previewPanel">
            <h4 id="previewTitle"></h4>
            <div class="preview-date" id="previewDate"></div>
            <div class="preview-body" id="previewBody"></div>
          </div>

          <div class="submit-row">
            <button class="btn-submit" id="submitBtn" onclick="submitPatchNote()">Publish Patch Note</button>
            <span class="discord-badge">🎮 Also posts to Discord</span>
            <span class="submit-status" id="submitStatus"></span>
          </div>
        </div>
      </div><!-- end tab-patch -->

      <button class="logout-btn" onclick="logout()" style="margin-top: 2rem;">Logout 🚪</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      databaseURL: "https://bot-counts-default-rtdb.firebaseio.com/",
    };
    firebase.initializeApp(firebaseConfig);

    const botsRef = firebase.database().ref('botStatuses');
    const patchNotesRef = firebase.database().ref('patchNotes');

    // ========== PASSWORD CONFIGURATION ==========
    const ADMIN_PASSWORD = 'meow1994';

    // Known latest versions per bot
    const KNOWN_VERSIONS = { 'cat-cafe': '1.5.0', 'meow-bot': '2.12.0', 'meow-manager': '2.10.0' };
    let latestVersions = { ...KNOWN_VERSIONS };

    function login() {
      const password = document.getElementById('passwordInput').value;
      const errorDiv = document.getElementById('loginError');
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!password) {
        errorDiv.textContent = '❌ Please enter a password';
        return;
      }

      if (password === ADMIN_PASSWORD) {
        if (rememberMe) {
          localStorage.setItem('adminLoggedIn', 'true');
        }

        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('passwordInput').value = '';
        document.getElementById('rememberMe').checked = false;
        loadStatuses();
        initPatchNotesTab();
      } else {
        errorDiv.textContent = '❌ Invalid password';
        document.getElementById('passwordInput').value = '';
      }
    }

    function logout() {
      localStorage.removeItem('adminLoggedIn');
      adminToken = '';
      sessionStorage.removeItem('adminToken');
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    // ========== TABS ==========
    function switchTab(tab, btn) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
    }

    async function setStatus(botId, status) {
      const statusDisplay = document.getElementById(`${botId}Status`);

      statusDisplay.textContent = '⏳ Updating...';
      statusDisplay.className = 'status-display loading';

      try {
        await botsRef.child(botId).set(status);

        statusDisplay.textContent = `Status: ${status}`;
        statusDisplay.className = 'status-display success';
        updateButtonStates(botId, status);
      } catch (error) {
        console.error('Error setting status:', error);
        statusDisplay.textContent = '❌ Error';
        statusDisplay.className = 'status-display error';
      }
    }

    function loadStatuses() {
      botsRef.on('value', (snapshot) => {
        const statuses = snapshot.val() || {};

        for (const botId of ['cat-cafe', 'meow-bot', 'meow-manager', 'twitch-bot']) {
          const status = statuses[botId] || 'offline';
          updateButtonStates(botId, status);
        }
      });
    }

    function updateButtonStates(botId, status) {
      const card = document.getElementById(`${botId}Card`);
      if (!card) return;

      const buttons = card.querySelectorAll('.status-btn');
      buttons.forEach(btn => btn.classList.remove('active'));

      const statusMap = {
        'online': 0,
        'offline': 1,
        'maintenance': 2,
        'purfecting': 3
      };

      if (statusMap[status] !== undefined) {
        buttons[statusMap[status]].classList.add('active');
      }
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('passwordInput');
      const button = document.getElementById('togglePassword');

      if (input.type === 'password') {
        input.type = 'text';
        button.textContent = '🙈';
      } else {
        input.type = 'password';
        button.textContent = '👁️';
      }
    }

    document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    // ========== PATCH NOTES ==========
    function initPatchNotesTab() {
      document.getElementById('patchDate').valueAsDate = new Date();
      document.getElementById('patchBot').addEventListener('change', updateVersionHint);
      fetchLatestVersions();
    }

    function fetchLatestVersions() {
      patchNotesRef.on('value', (snapshot) => {
        const notesObj = snapshot.val() || {};
        const notes = Object.values(notesObj);
        for (const note of notes) {
          const match = note.version.match(/(\d+)\.(\d+)\.(\d+)/);
          if (!match) continue;
          const ver = match[0];
          if (!latestVersions[note.botId] || compareVersions(ver, latestVersions[note.botId]) > 0) {
            latestVersions[note.botId] = ver;
          }
        }
        updateVersionHint();
      });
    }

    function compareVersions(a, b) {
      const pa = a.split('.').map(Number);
      const pb = b.split('.').map(Number);
      for (let i = 0; i < 3; i++) {
        if (pa[i] > pb[i]) return 1;
        if (pa[i] < pb[i]) return -1;
      }
      return 0;
    }

    function bumpVersion(type) {
      const botId = document.getElementById('patchBot').value;
      const current = latestVersions[botId] || '1.0.0';
      const parts = current.split('.').map(Number);
      if (type === 'major') { parts[0]++; parts[1] = 0; parts[2] = 0; }
      else if (type === 'minor') { parts[1]++; parts[2] = 0; }
      else { parts[2]++; }
      document.getElementById('patchVersion').value = 'Version ' + parts.join('.');
    }

    function updateVersionHint() {
      const botId = document.getElementById('patchBot').value;
      const current = latestVersions[botId] || '?.?.?';
      document.getElementById('versionHint').textContent = 'Current: v' + current + '  •  Click a bump button or type manually';
    }

    // Editor
    function fmt(command) {
      document.execCommand(command, false, null);
      document.getElementById('patchContent').focus();
    }
    function insertCode() {
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const text = sel.toString();
        document.execCommand('insertHTML', false, '<code>' + (text || 'command') + '</code>');
      }
    }
    function insertHeading() {
      const text = prompt('Section heading text:', '🔧 Bug Fixes');
      if (text) document.execCommand('insertHTML', false, '<p><strong>' + text + '</strong></p>');
    }
    function insertEmoji() {
      const emojis = ['🔧', '🚀', '✨', '🎉', '🐛', '⚡', '🎮', '🐱', '💜', '📋', '🗑️', '⚖️', '🎯', '📊', '🛡️'];
      const pick = prompt('Pick an emoji or type your own:\n\n' + emojis.join(' '));
      if (pick) document.execCommand('insertText', false, pick);
    }

    // Preview
    function togglePreview() {
      const panel = document.getElementById('previewPanel');
      panel.classList.toggle('active');
      if (panel.classList.contains('active')) updatePreview();
    }
    function updatePreview() {
      const version = document.getElementById('patchVersion').value || 'Version X.X.X';
      const title = document.getElementById('patchTitle').value || 'Untitled';
      const date = document.getElementById('patchDate').value;
      const content = document.getElementById('patchContent').innerHTML;
      const dateObj = date ? new Date(date + 'T12:00:00') : new Date();
      const formatted = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('previewTitle').textContent = '🔧 ' + version + ' - "' + title + '"';
      document.getElementById('previewDate').textContent = 'Release Date: ' + formatted;
      document.getElementById('previewBody').innerHTML = content;
    }

    // Submit
    async function submitPatchNote() {
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('submitStatus');
      const botSelect = document.getElementById('patchBot');
      const botId = botSelect.value;
      const botName = botSelect.options[botSelect.selectedIndex].dataset.name;
      const version = document.getElementById('patchVersion').value.trim();
      const title = document.getElementById('patchTitle').value.trim();
      const date = document.getElementById('patchDate').value;
      const contentHtml = document.getElementById('patchContent').innerHTML.trim();

      if (!version || !title || !contentHtml) {
        status.className = 'submit-status error';
        status.textContent = 'Please fill in version, title, and content.';
        return;
      }

      const dateObj = new Date(date + 'T12:00:00');
      const displayDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      btn.disabled = true;
      btn.textContent = 'Publishing...';
      status.className = 'submit-status';
      status.textContent = '';

      try {
        const noteId = Date.now().toString();
        await patchNotesRef.child(noteId).set({
          id: noteId,
          botId,
          botName,
          version,
          title,
          date: displayDate,
          contentHtml,
          createdAt: new Date().toISOString()
        });

        status.className = 'submit-status success';
        status.textContent = '✅ Published';
        const verMatch = version.match(/(\d+)\.(\d+)\.(\d+)/);
        if (verMatch) latestVersions[botId] = verMatch[0];
        updateVersionHint();
        document.getElementById('patchVersion').value = '';
        document.getElementById('patchTitle').value = '';
        document.getElementById('patchContent').innerHTML = '';
        document.getElementById('previewPanel').classList.remove('active');
      } catch (e) {
        console.error('Error publishing patch note:', e);
        status.className = 'submit-status error';
        status.textContent = '❌ Error publishing. Check Firebase permissions.';
      }
      btn.disabled = false;
      btn.textContent = 'Publish Patch Note';
    }

    // ========== INIT ==========
    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('adminLoggedIn') === 'true') {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadStatuses();
        initPatchNotesTab();
      }
    });
  </script>
</body>
</html>
