<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Admin - Meow Bots</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a1a;
      color: #ffffff;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 50%, rgba(129, 140, 248, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(179, 144, 247, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(103, 232, 249, 0.12) 0%, transparent 40%);
      animation: bgFloat 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translateY(0px); opacity: 0.4; }
      50% { transform: translateY(-10px); opacity: 0.6; }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: float-particle 20s infinite ease-in-out;
    }

    @keyframes float-particle {
      0% { opacity: 0; transform: translateY(100vh) translateX(0); }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-100vh) translateX(100px); }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-container,
    .admin-container {
      backdrop-filter: blur(10px);
      background: rgba(10, 10, 26, 0.6);
      border: 1px solid rgba(129, 140, 248, 0.25);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 1100px;
      position: relative;
      overflow: hidden;
    }

    .login-container {
      max-width: 450px;
    }

    .login-container::before,
    .admin-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #818cf8, #b390f7, #67e8f9, #86efac, #fde68a);
      background-size: 200% 100%;
      animation: rainbow-wave 4s ease-in-out infinite;
    }

    @keyframes rainbow-wave {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #818cf8, #b390f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"],
    input[type="text"],
    input[type="text"].password-input {
      width: 100%;
      padding: 0.8rem 2.5rem 0.8rem 0.8rem;
      border: 1px solid rgba(129, 140, 248, 0.3);
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      font-size: 1rem;
      color: #ffffff;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
    }

    input[type="password"]::placeholder,
    input[type="text"].password-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input[type="password"]:focus,
    input[type="text"].password-input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 20px rgba(129, 140, 248, 0.3);
      background: rgba(0, 0, 0, 0.5);
    }

    .password-toggle {
      position: absolute;
      right: 0.8rem;
      background: none;
      border: none;
      color: rgba(129, 140, 248, 0.7);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.4rem;
      transition: color 0.3s;
    }

    .password-toggle:hover {
      color: #818cf8;
    }

    .remember-me {
      display: flex;
      align-items: center;
      margin-bottom: 1.5rem;
      cursor: pointer;
      user-select: none;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 0.5rem;
      cursor: pointer;
      accent-color: #818cf8;
    }

    .remember-me label {
      margin: 0;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 400;
      cursor: pointer;
    }

    button {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 10px;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      color: #fff;
      border: none;
      font-size: 1rem;
      font-weight: 700;
    }

    .btn-login:hover {
      box-shadow: 0 0 30px rgba(129, 140, 248, 0.6);
      transform: translateY(-2px);
    }

    .error {
      color: #ff1744;
      text-align: center;
      margin-top: 1rem;
      font-weight: 600;
    }

    .bots-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .bot-card {
      padding: 1.5rem;
      background: linear-gradient(135deg, rgba(129, 140, 248, 0.08), rgba(179, 144, 247, 0.08));
      border: 1px solid rgba(129, 140, 248, 0.25);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .bot-card:hover {
      border-color: rgba(129, 140, 248, 0.5);
      box-shadow: 0 8px 30px rgba(129, 140, 248, 0.15);
      transform: translateY(-5px);
    }

    .bot-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #818cf8, #b390f7, #67e8f9);
    }

    .bot-card h2 {
      margin-bottom: 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #818cf8, #b390f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-display {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.8rem;
      min-height: 18px;
    }

    .status-display.success {
      color: #86efac;
    }

    .status-display.loading {
      color: #fde68a;
    }

    .status-display.error {
      color: #ff1744;
    }

    .status-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .status-btn {
      padding: 0.6rem;
      border: 1px solid rgba(129, 140, 248, 0.4);
      background: rgba(129, 140, 248, 0.1);
      color: #818cf8;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .status-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(129, 140, 248, 0.3);
    }

    .status-btn.online {
      border-color: #86efac;
      color: #86efac;
      background: rgba(134, 239, 172, 0.1);
    }

    .status-btn.online.active {
      background: rgba(134, 239, 172, 0.3);
      box-shadow: 0 6px 15px rgba(134, 239, 172, 0.4);
    }

    .status-btn.offline {
      border-color: #ff1744;
      color: #ff1744;
      background: rgba(255, 23, 68, 0.1);
    }

    .status-btn.offline.active {
      background: rgba(255, 23, 68, 0.3);
      box-shadow: 0 6px 15px rgba(255, 23, 68, 0.4);
    }

    .status-btn.maintenance {
      border-color: #fde68a;
      color: #fde68a;
      background: rgba(253, 230, 138, 0.1);
    }

    .status-btn.maintenance.active {
      background: rgba(253, 230, 138, 0.3);
      box-shadow: 0 6px 15px rgba(253, 230, 138, 0.4);
    }

    .status-btn.purfecting {
      border-color: #b390f7;
      color: #b390f7;
      background: rgba(179, 144, 247, 0.1);
    }

    .status-btn.purfecting.active {
      background: rgba(179, 144, 247, 0.3);
      box-shadow: 0 6px 15px rgba(179, 144, 247, 0.4);
    }

    .logout-btn {
      width: 100%;
      padding: 0.8rem;
      background: rgba(179, 144, 247, 0.2);
      border: 1px solid rgba(179, 144, 247, 0.4);
      color: #b390f7;
      font-size: 1rem;
    }

    .logout-btn:hover {
      background: rgba(179, 144, 247, 0.3);
      box-shadow: 0 8px 20px rgba(179, 144, 247, 0.3);
      transform: translateY(-2px);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .bots-grid {
        grid-template-columns: 1fr;
      }

      .admin-container {
        max-width: 100%;
        padding: 1.5rem;
      }

      .status-buttons {
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
      }

      .status-btn {
        padding: 0.8rem;
        font-size: 0.9rem;
      }

      .bot-card {
        padding: 1.5rem;
      }

      button {
        min-height: 44px;
      }

      input[type="password"] {
        padding: 1rem;
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 1rem;
      }

      .login-container,
      .admin-container {
        padding: 1.5rem;
        border-radius: 15px;
      }

      h1 {
        font-size: 1.4rem;
        margin-bottom: 1.2rem;
      }

      .bot-card h2 {
        font-size: 1rem;
        margin-bottom: 0.8rem;
      }

      .status-buttons {
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
      }

      .status-btn {
        padding: 0.7rem;
        font-size: 0.8rem;
      }

      .logout-btn {
        padding: 0.9rem;
        font-size: 0.95rem;
      }

      input[type="password"] {
        padding: 0.9rem;
      }

      .btn-login {
        padding: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="particles">
    <div class="particle" style="left: 10%; animation-delay: 0s;">✨</div>
    <div class="particle" style="left: 25%; animation-delay: 4s;">🐱</div>
    <div class="particle" style="left: 40%; animation-delay: 8s;">⭐</div>
    <div class="particle" style="left: 60%; animation-delay: 12s;">😺</div>
    <div class="particle" style="left: 80%; animation-delay: 16s;">💫</div>
  </div>

  <div class="content">
    <div id="loginForm" class="login-container">
      <h1>🐱 Bot Admin</h1>
      <div class="form-group">
        <label for="passwordInput">Admin Password</label>
        <div class="password-wrapper">
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="off"/>
          <button type="button" class="password-toggle" id="togglePassword" onclick="togglePasswordVisibility()">👁️</button>
        </div>
      </div>
      <div class="remember-me">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember me</label>
      </div>
      <button class="btn-login" onclick="login()">Login</button>
      <div class="error" id="loginError"></div>
    </div>

    <div id="adminPanel" class="admin-container hidden">
      <h1>🐱 Bot Status Control</h1>

      <div class="bots-grid">
        <div class="bot-card" id="cat-cafeCard">
          <h2>🎮 Cat Cafe</h2>
          <div class="status-display" id="cat-cafeStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('cat-cafe', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('cat-cafe', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('cat-cafe', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('cat-cafe', 'purfecting')">✨ Perf</button>
          </div>
        </div>

        <div class="bot-card" id="meow-botCard">
          <h2>😺 Meow Bot</h2>
          <div class="status-display" id="meow-botStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('meow-bot', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('meow-bot', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('meow-bot', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('meow-bot', 'purfecting')">✨ Perf</button>
          </div>
        </div>

        <div class="bot-card" id="meow-managerCard">
          <h2>👑 Meow Manager</h2>
          <div class="status-display" id="meow-managerStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('meow-manager', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('meow-manager', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('meow-manager', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('meow-manager', 'purfecting')">✨ Perf</button>
          </div>
        </div>

        <div class="bot-card" id="twitch-botCard">
          <h2>🎥 Twitch Meow Bot</h2>
          <div class="status-display" id="twitch-botStatus"></div>
          <div class="status-buttons">
            <button class="status-btn online" onclick="setStatus('twitch-bot', 'online')">✅ Online</button>
            <button class="status-btn offline" onclick="setStatus('twitch-bot', 'offline')">❌ Offline</button>
            <button class="status-btn maintenance" onclick="setStatus('twitch-bot', 'maintenance')">🔧 Maint</button>
            <button class="status-btn purfecting" onclick="setStatus('twitch-bot', 'purfecting')">✨ Perf</button>
          </div>
        </div>
      </div>

      <button class="logout-btn" onclick="logout()">Logout 🚪</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      databaseURL: "https://bot-counts-default-rtdb.firebaseio.com/",
    };
    firebase.initializeApp(firebaseConfig);

    const botsRef = firebase.database().ref('botStatuses');

    // ========== PASSWORD CONFIGURATION ==========
    const ADMIN_PASSWORD = 'suitcase1994!';

    function login() {
      const password = document.getElementById('passwordInput').value;
      const errorDiv = document.getElementById('loginError');
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!password) {
        errorDiv.textContent = '❌ Please enter a password';
        return;
      }

      if (password === ADMIN_PASSWORD) {
        if (rememberMe) {
          localStorage.setItem('adminLoggedIn', 'true');
        }

        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('passwordInput').value = '';
        document.getElementById('rememberMe').checked = false;
        loadStatuses();
      } else {
        errorDiv.textContent = '❌ Invalid password';
        document.getElementById('passwordInput').value = '';
      }
    }

    function logout() {
      localStorage.removeItem('adminLoggedIn');
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    async function setStatus(botId, status) {
      const statusDisplay = document.getElementById(`${botId}Status`);

      statusDisplay.textContent = '⏳ Updating...';
      statusDisplay.className = 'status-display loading';

      try {
        await botsRef.child(botId).set(status);

        statusDisplay.textContent = `Status: ${status}`;
        statusDisplay.className = 'status-display success';
        updateButtonStates(botId, status);
      } catch (error) {
        console.error('Error setting status:', error);
        statusDisplay.textContent = '❌ Error';
        statusDisplay.className = 'status-display error';
      }
    }

    function loadStatuses() {
      botsRef.on('value', (snapshot) => {
        const statuses = snapshot.val() || {};

        for (const botId of ['cat-cafe', 'meow-bot', 'meow-manager', 'twitch-bot']) {
          const status = statuses[botId] || 'offline';
          updateButtonStates(botId, status);
        }
      });
    }

    function updateButtonStates(botId, status) {
      const card = document.getElementById(`${botId}Card`);
      if (!card) return;

      const buttons = card.querySelectorAll('.status-btn');
      buttons.forEach(btn => btn.classList.remove('active'));

      const statusMap = {
        'online': 0,
        'offline': 1,
        'maintenance': 2,
        'purfecting': 3
      };

      if (statusMap[status] !== undefined) {
        buttons[statusMap[status]].classList.add('active');
      }
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('passwordInput');
      const button = document.getElementById('togglePassword');

      if (input.type === 'password') {
        input.type = 'text';
        button.textContent = '🙈';
      } else {
        input.type = 'password';
        button.textContent = '👁️';
      }
    }

    document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('adminLoggedIn') === 'true') {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadStatuses();
      }
    });
  </script>
</body>
</html>
